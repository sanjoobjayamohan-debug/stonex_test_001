<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonex Admin — Login</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <svg class="login-logo-icon" viewBox="0 0 40 40" fill="none">
          <polygon points="20,2 38,35 2,35" fill="url(#lg1)" />
          <defs>
            <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#F97316"/>
              <stop offset="100%" stop-color="#DC2626"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="login-logo-text">
          <span class="logo-name">STONEX</span>
          <span class="logo-sub">Admin Portal</span>
        </div>
      </div>

      <h1 class="login-title">Welcome back 👋</h1>
      <p class="login-subtitle">Sign in to access the admin dashboard</p>

      <div class="login-error" id="login-error"></div>

      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="admin-email">Email Address</label>
          <input type="email" id="admin-email" placeholder="admin@stonextrading.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="login-btn">
          <span id="login-btn-text">Sign In</span>
        </button>
      </form>

      <div class="login-footer">
        <a href="mailto:info@stonextrading.com">Need help? Contact support</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="admin.js"></script>
</body>
</html>
